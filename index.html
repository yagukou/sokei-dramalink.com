<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

     <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #eee;
      padding: 10px 20px;
    }

    .menu-left, .menu-right {
      display: flex;
      gap: 10px;
      justify-content: space-around;
      align-items: center;
    }

    .menu-left div, .menu-right div {
      display: flex;
      flex-direction: column;  /* ←縦にする */
      align-items: center;
      text-align: center;
}
 
    .menu-left img, .menu-right img {
       width: 30px;
       height: 30px;
       margin-bottom: 5px;
}

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    a {
      text-decoration: none;
      flex-direction: column;
      color: black;
      font-size: 12px;
    }

    .lang-wrapper {
  position: relative;
}

.lang-menu {
  position: absolute;
  top: 60px;
  left: 0;
  width: 200px;
  background: #eee;
  border-radius: 10px;
  display: none;
  overflow: hidden;
  z-index: 9999;
}

.lang-menu div {
  padding: 12px;
  text-align: center;
  cursor: pointer;
  border-bottom: 1px solid #ccc;
}

.lang-menu div:hover {
  background: #ddd;
}
 
@media (max-width: 768px) {

  header {
    display: block;
  }

  /* 上段 */
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
  }

  .top-right {
    display: flex;
    gap: 10px;
  }
  
  /* 下段 */
  .bottom-row {
    display: flex;
    justify-content: space-around;
    padding: 10px;
  }

  /* アイコン＋文字 */
  .menu-1 {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .menu-1 img {
    width: 30px;
  }

  .menu-1 span {
    font-size: 12px;
  }

}

  .logo {
  margin-right: auto; /* ←これが超重要 */
}

  .top-row, .bottom-row {
    display: flex; /* スマホ版だけ表示 */
    display: none;
}

  .menu-left, .menu-right, .logo {
    display: flex;
  }

  </style>
 </head>

  <body>
    <header>
  <!-- 左 -->
  <div class="menu-left">
   <div class="lang-wrapper">
  <a class="menu-1" onclick="toggleLangMenu()">
    <img src="Language2.png">
    <span>Language</span>
  </a>

   <div id="lang-menu" class="lang-menu">
    <div onclick="setLang('ja')">日本語</div>
    <div onclick="setLang('en')">ENGLISH</div>
    <div onclick="setLang('zh-CN')">简体中文</div>
    <div onclick="setLang('zh-TW')">繁體中文</div>
    <div onclick="setLang('ko')">한국어</div>
    <div onclick="setLang('th')">ภาษาไทย</div>
   </div>
</div>
   <a href="Inquiry.html" class="menu-1">
  <img src="Inquiry.png" width="50">
  <span>お問い合わせ</span>
  </a>
    <a href="menu.html" class="menu-1">
  <img src="menu.png" width="50">
  <span>メニュー</span>
  </a>
  </div>

  <!-- 真ん中 -->
  <div class="logo">早慶演劇祭</div>

  <!-- 右 -->
  <div class="menu-right">
    <a href="ticket.html" class="menu-1">
  <img src="ticket.png" width="50">
  <span>チケット</span>
</a>
    <a href="Schedule.html" class="menu-1">
  <img src="Schedule.png" width="50">
  <span>スケジュール</span>
</a>
    <a href="Participant.html" class="menu-1">
  <img src="Participant.png" width="50">
  <span>出場団体</span>
  </a>
    <a href="what.html" class="menu-1">
  <img src="what.png" width="50">
  <span>早慶演劇祭とは</span>
  </a>
    <a href="news.html" class="menu-1">
  <img src="news.png" width="50">
  <span>ニュース</span>
  </a>
  </div>
</header>
  </body>

</html>

<script>
function toggleLangMenu() {
  const menu = document.getElementById("lang-menu");
  menu.style.display = (menu.style.display === "block") ? "none" : "block";
}
</script>

<script>
function setLang(lang) {
  document.cookie = "googtrans=/ja/" + lang + "; path=/";
  location.reload();
}
</script>

<div id="google_translate_element" style="display:none;"></div>

<script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'ja'
  }, 'google_translate_element');
}
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
