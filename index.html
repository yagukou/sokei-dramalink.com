<!DOCTYPE html>

     <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #eee;
      padding: 10px 20px;
    }

    .menu-left, .menu-right {
      display: flex;
      gap: 10px;
      justify-content: space-around;
      align-items: center;
    }

    .menu-left div, .menu-right div {
      display: flex;
      flex-direction: column;  /* ←縦にする */
      align-items: center;
      text-align: center;
}

    .menu-left img, .menu-right img {
       width: 30px;
       height: 30px;
       margin-bottom: 5px;
}

    .logo {
      font-size: 24px;
      font-weight: bold;
      font-family: "Times New Roman", serif;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #222;
    }

    a {
      text-decoration: none;
      flex-direction: column;
      color: black;
      font-size: 12px;
    }

        .menu-1 {
  display: flex;
  flex-direction: column;
  align-items: center;

  background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.menu-1, .language-btn {
  background: #edb19e;; /* 好きな色 */
  color: white;
}

/* ホバー効果 */
.menu-1:hover {
  transform: translateY(-3px);
  transition: 0.3s;
}

.slider {
  position: relative;
  width: 80%;
  margin: 30px auto;
  overflow: hidden;
}

.slides {
  position: relative;
}

.slide {
  width: 100%;
  display: none;
  border-radius: 10px;
}

.slide.active {
  display: block;
}

button.prev, button.next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

@media (max-width: 768px) {

  header {
    display: block;
  }

  /* 上段 */
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
  }

  .top-right {
    display: flex;
    gap: 10px;
  }

  /* 下段 */
  .bottom-row {
    display: flex;
    justify-content: space-around;
    padding: 10px;
  }

  /* アイコン＋文字 */
  .menu-1 {
    display: flex;
    flex-direction: column;
    align-items: center;

     background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
  }

  .menu-1 img {
    width: 30px;
  }

  .menu-1 span {
    font-size: 12px;
  }

  .logo {
  margin-right: auto; /* ←これが超重要 */
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

  .top-row, .bottom-row {
    display: flex; /* スマホ版だけ表示 */
    display: none;
}

  .menu-left, .menu-right, .logo {
    display: flex;
  }

  .menu-1, .language-btn {
  background: #edb19e;; /* 好きな色 */
  color: white;
}

  </style>
 </head>

<div class="slider">
  <div class="slides">
    <img src="img1.jpg" class="slide active">
    <img src="img2.jpg" class="slide">
    <img src="img3.jpg" class="slide">
  </div>

  <button class="prev">◀</button>
  <button class="next">▶</button>
</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(n) {
  slides.forEach(slide => slide.classList.remove("active"));
  slides[n].classList.add("active");
}

document.querySelector(".next").onclick = () => {
  index = (index + 1) % slides.length;
  showSlide(index);
};

document.querySelector(".prev").onclick = () => {
  index = (index - 1 + slides.length) % slides.length;
  showSlide(index);
};
</script>
