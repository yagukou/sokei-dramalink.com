<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>【管理画面】ニュース編集・削除</title>
    <style> 
    body {
      margin: 0;
      font-family: sans-serif;
      background: #222;  
      color: white; 
      padding: 20px;
    }
    .admin-container {
      max-width: 800px;
      margin: 0 auto;
    }
    h2 {
      color: #c5a059;
      border-bottom: 2px solid #c5a059;
      padding-bottom: 10px;
    }
    .news-item {
      background: #333;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .news-info {
      flex: 1;
    }
    .news-meta {
      color: #aaa;
      font-size: 13px;
      margin-bottom: 5px;
    }
    .delete-btn {
      background: #ff4d4d;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .delete-btn:hover { background: #e04343; }
    .news-title { font-size: 16px; margin: 5px 0 0 0; color: #fff; }
    
    .form-section {
      background: #111;
      padding: 20px;
      border-radius: 8px;
      margin-top: 40px;
      border: 1px solid #444;
    }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #ccc; font-size: 14px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px; background: #222; border: 1px solid #555; color: white; border-radius: 4px; box-sizing: border-box;
    }
    .form-group input[type="file"] {
      background: #333;
      border: 1px dashed #666;
      padding: 12px;
      cursor: pointer;
      color: #fff;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #c5a059; outline: none; }
    .submit-btn {
      background: #b90e0e; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%;
    }
    .submit-btn:hover { background: #d61515; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://blviywoprvcatwwrrysi.supabase.co"; 
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsdml5d29wcnZjYXR3d3JyeXNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MzM2MDUsImV4cCI6MjA5ODAwOTYwNX0.SAp7KNf21RKE5SStRlazyX5zKe-LVVCcEHz_fBV6UP8"; 
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>
  </head>
  <body>
    <div class="admin-container">
      <h2>📢 ニュース管理画面</h2>
      
      <div id="news-container"></div>

      <div class="form-section">
        <h3>➕ 新しいニュースを掲載する</h3>
        <form id="news-form" onsubmit="submitNews(event)">
          
          <div class="form-group">
            <label>カテゴリー *</label>
            <select id="news-category">
              <option value="トピックス">トピックス</option>
              <option value="チケット">チケット</option>
              <option value="公演情報">公演情報</option>
              <option value="重要なお知らせ">重要なお知らせ</option>
            </select>
          </div>

          <div class="form-group">
            <label>画像ファイルを選択 (任意)</label>
            <input type="file" id="news-file" accept="image/*">
          </div>

          <div class="form-group">
            <label>タイトル *</label>
            <input type="text" id="news-title-ja" required placeholder="ニュースのタイトルを入力してください">
          </div>
          
          <div class="form-group">
            <label>一覧用の一言（本文） *</label>
            <textarea id="news-content-ja" required rows="3" placeholder="カード一覧画面に表示される短い説明文を入力してください"></textarea>
          </div>

          <!-- 🌟 長い詳細説明の入力欄を復活 -->
          <div class="form-group">
            <label>タップ後の詳細説明 (任意)</label>
            <textarea id="news-detail-content-ja" rows="6" placeholder="ニュースをタップしたポップアップ内に表示する、詳細な本文を入力してください（空欄の場合は上記の一言と同じ内容が表示されます）"></textarea>
          </div>

          <button type="submit" class="submit-btn">ニュースを掲載する</button>
        </form>
      </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => { fetchGlobalNews(); });

    async function submitNews(event) {
      event.preventDefault();
      const category = document.getElementById('news-category').value;
      const fileInput = document.getElementById('news-file');
      const titleJa = document.getElementById('news-title-ja').value;
      const contentJa = document.getElementById('news-content-ja').value;
      const detailContentJa = document.getElementById('news-detail-content-ja').value; // 追加

      try {
        let imageUrl = "";

        if (fileInput && fileInput.files.length > 0) {
          const file = fileInput.files[0];
          const fileExt = file.name.split('.').pop();
          const fileName = `${Date.now()}.${fileExt}`;
          const filePath = `${fileName}`;

          // ⭕ 保存先を「news-bucket」に一元修正！
          const { data: uploadData, error: uploadError } = await db.storage
            .from('news-bucket')
            .upload(filePath, file);

          if (uploadError) throw uploadError;

          const { data: publicUrlData } = db.storage
            .from('news-bucket')
            .getPublicUrl(filePath);
          
          imageUrl = publicUrlData.publicUrl;
        }

        const { data: newNews, error: newsError } = await db.from('news').insert([{ category, image_url: imageUrl }]).select().single();
        if (newsError) throw newsError;

        // 🌟 detail_content も一緒にデータベースへ登録するように修正
        const { error: transError } = await db.from('news_translations').insert([
          { 
            news_id: newNews.id, 
            lang: 'ja', 
            title: titleJa, 
            content: contentJa,
            detail_content: detailContentJa ? detailContentJa : null
          }
        ]);
        if (transError) throw transError;

        alert('ニュースを掲載しました！');
        document.getElementById('news-form').reset();
        await fetchGlobalNews();
      } catch (error) {
        alert('掲載に失敗しました: ' + error.message);
      }
    }

    async function fetchGlobalNews() {
      try {
        const { data: newsList, error } = await db
          .from('news')
          .select(`id, created_at, category, news_translations!inner (title)`)
          .eq('news_translations.lang', 'ja')
          .order('created_at', { ascending: false });

        if (error) throw error;
        renderNewsList(newsList);
      } catch (error) {
        console.error('ニュース取得エラー:', error);
      }
    }

    function renderNewsList(newsList) {
      const container = document.getElementById('news-container');
      container.innerHTML = ''; 
      if (!newsList || newsList.length === 0) {
        container.innerHTML = '<p style="color: #aaa;">現在掲載されているニュースはありません。</p>';
        return;
      }
      newsList.forEach(item => {
        const translation = item.news_translations[0]; 
        if (!translation) return;
        const dateStr = new Date(item.created_at).toLocaleDateString('ja-JP', {year: 'numeric', month: '2-digit', day: '2-digit'});
        
        container.innerHTML += `
          <div class="news-item">
            <div class="news-info">
              <div class="news-meta">
                <span style="color:#c5a059; margin-right:10px;">[${item.category || 'トピックス'}]</span>
                <span>${dateStr}</span>
              </div>
              <h4 class="news-title">${escapeHtml(translation.title)}</h4>
            </div>
            <button class="delete-btn" onclick="deleteNews('${item.id}')">削除</button>
          </div>
        `;
      });
    }

    async function deleteNews(newsId) {
      if (!confirm('このニュースを削除してもよろしいですか？')) return;
      try {
        const { error } = await db.from('news').delete().eq('id', newsId);
        if (error) throw error;
        alert('ニュースを削除しました。');
        await fetchGlobalNews();
      } catch (error) {
        alert('削除に失敗しました: ' + error.message);
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    </script>
  </body>
</html>
