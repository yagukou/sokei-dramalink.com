<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>【管理画面】ニュース編集・削除</title>
    <style> 
    body { margin: 0; font-family: sans-serif; background: #222; color: white; padding: 20px; }
    .admin-container { max-width: 800px; margin: 0 auto; }
    h2 { color: #c5a059; border-bottom: 2px solid #c5a059; padding-bottom: 10px; }
    .news-item { background: #333; padding: 15px; margin-bottom: 15px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
    .news-item:hover { background: #3c3c3c; }
    .news-meta { display: flex; justify-content: space-between; align-items: center; color: #aaa; font-size: 14px; margin-bottom: 10px; }
    .delete-btn { background: #ff4d4d; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
    .news-title { font-size: 18px; margin: 0 0 10px 0; color: #fff; }
    .news-content { white-space: pre-wrap; color: #ccc; font-size: 14px; margin: 0; }
    .news-img-preview { max-width: 200px; max-height: 120px; object-fit: contain; display: block; margin-bottom: 10px; border-radius: 4px; background: #000; }
    .form-section { background: #111; padding: 20px; border-radius: 8px; margin-top: 40px; border: 1px solid #444; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #ccc; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px; background: #222; border: 1px solid #555; color: white; border-radius: 4px; box-sizing: border-box; }
    .submit-btn { background: #b90e0e; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .submit-btn:hover { background: #d61515; }
    /* 詳細ポップアップ（モーダル） */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content { background: #333; padding: 30px; border-radius: 10px; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; position: relative; border: 1px solid #555; }
    .modal-close { position: absolute; top: 15px; right: 15px; background: #555; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
    .modal-img { width: 100%; max-height: 350px; object-fit: contain; background: #000; border-radius: 6px; margin-bottom: 20px; display: none; }
    .modal-title { color: #c5a059; font-size: 24px; margin: 10px 0 15px 0; }
    .modal-text { color: #ddd; font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://blviywoprvcatwwrrysi.supabase.co"; 
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsdml5d29wcnZjYXR3d3JyeXNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzM2MDUsImV4cCI6MjA5ODAwOTYwNX0.SAp7KNf21RKE5SStRlazyX5zKe-LVVCcEHz_fBV6UP8"; 
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>
  </head>
  <body>
    <div class="admin-container">
      <h2>📢 ニュース管理画面 (編集・削除)</h2>
      <div id="news-container"><p style="color: #aaa; text-align: center;">読み込み中...</p></div>

      <div class="form-section">
        <h3>➕ 新しいニュースを掲載する</h3>
        <form id="news-form" onsubmit="submitNews(event)">
          <div class="form-group">
            <label>タイトル *</label>
            <input type="text" id="news-title-ja" required placeholder="ニュースのタイトルを入力">
          </div>
          <div class="form-group">
            <label>一覧用の短い説明（本文） *</label>
            <textarea id="news-content-ja" required rows="3" placeholder="一覧画面に表示される短い文章"></textarea>
          </div>
          <!-- 💡 長い詳細入力欄を追加！ -->
          <div class="form-group">
            <label>タップしたときに見せる長い詳細説明 *</label>
            <textarea id="news-detail-ja" required rows="6" placeholder="タップしたあとのポップアップ画面に表示される詳細な文章"></textarea>
          </div>
          <div class="form-group">
            <label>添付画像（任意）</label>
            <input type="file" id="news-image" accept="image/*">
          </div>
          <button type="submit" class="submit-btn" id="submit-btn">ニュースを掲載する</button>
        </form>
      </div>
    </div>

    <!-- ポップアップ詳細画面 -->
    <div class="modal-overlay" id="detail-modal" onclick="closeModal(event)">
      <div class="modal-content">
        <button class="modal-close" onclick="closeModal(event, true)">✕ 閉じる</button>
        <div class="modal-date" id="modal-date"></div>
        <h3 class="modal-title" id="modal-title"></h3>
        <img src="" alt="詳細画像" class="modal-img" id="modal-img">
        <p class="modal-text" id="modal-text"></p>
      </div>
    </div>

    <script>
    let globalNewsData = [];
    document.addEventListener('DOMContentLoaded', () => { fetchGlobalNews(); });

    async function submitNews(event) {
      event.preventDefault();
      const btn = document.getElementById('submit-btn');
      const titleJa = document.getElementById('news-title-ja').value;
      const contentJa = document.getElementById('news-content-ja').value;
      const detailJa = document.getElementById('news-detail-ja').value; // 💡 取得
      const imageFile = document.getElementById('news-image').files[0];

      btn.disabled = true;
      btn.innerText = "投稿中...";

      try {
        let imageUrl = null;
        if (imageFile) {
          const fileExt = imageFile.name.split('.').pop();
          const filePath = `news_images/${Date.now()}.${fileExt}`;
          const { error: uploadError } = await db.storage.from('news-bucket').upload(filePath, imageFile);
          if (uploadError) throw uploadError;
          imageUrl = db.storage.from('news-bucket').getPublicUrl(filePath).data.publicUrl;
        }

        const { data: newNewsArray, error: newsError } = await db.from('news').insert([{ image_url: imageUrl }]).select('*');
        if (newsError) throw newsError;

        // 💡 detail_content も一緒に保存！
        const { error: transError } = await db.from('news_translations').insert([
          { news_id: newNewsArray[0].id, lang: 'ja', title: titleJa, content: contentJa, detail_content: detailJa }
        ]);
        if (transError) throw transError;

        alert('ニュースを掲載しました！');
        document.getElementById('news-form').reset();
        await fetchGlobalNews();
      } catch (error) {
        alert("投稿失敗: " + error.message);
      } finally {
        btn.disabled = false;
        btn.innerText = "ニュースを掲載する";
      }
    }

    async function fetchGlobalNews() {
      try {
        const { data: newsList } = await db.from('news').select('*').order('created_at', { ascending: false });
        // 💡 detail_content も取得対象に加える
        const { data: transList } = await db.from('news_translations').select('news_id, title, content, detail_content').eq('lang', 'ja');

        globalNewsData = (newsList || []).map(item => {
          const trans = (transList || []).find(t => t.news_id === item.id);
          return { ...item, news_translations: trans ? [trans] : [] };
        });
        renderNewsList(globalNewsData);
      } catch (error) { console.error(error); }
    }

    function renderNewsList(newsList) {
      const container = document.getElementById('news-container');
      container.innerHTML = '';
      if (!newsList.length) { container.innerHTML = '<p style="color:#aaa;">ありません。</p>'; return; }
      newsList.forEach(item => {
        const translation = item.news_translations[0];
        if (!translation) return;
        const dateStr = new Date(item.created_at).toLocaleDateString('ja-JP', {year:'numeric', month:'2-digit', day:'2-digit'});
        const newsItem = document.createElement('div');
        newsItem.className = 'news-item';
        newsItem.addEventListener('click', (e) => {
          if (e.target.classList.contains('delete-btn')) return;
          openModal(item.id, dateStr);
        });
        let imgHtml = item.image_url ? `<img src="${item.image_url}" class="news-img-preview">` : '';
        newsItem.innerHTML = `
          <div class="news-meta"><span>${dateStr}</span><button class="delete-btn" onclick="deleteNews('${item.id}')">削除</button></div>
          ${imgHtml}<h4 class="news-title">${escapeHtml(translation.title)}</h4><p class="news-content">${escapeHtml(translation.content)}</p>
        `;
        container.appendChild(newsItem);
      });
    }

    function openModal(newsId, dateStr) {
      const item = globalNewsData.find(n => n.id === newsId);
      if (!item) return;
      const trans = item.news_translations[0];
      if (!trans) return;

      document.getElementById('modal-date').innerText = dateStr;
      document.getElementById('modal-title').innerText = trans.title;
      // 💡 モーダル（詳細）には長い説明文（detail_content）を表示！
      document.getElementById('modal-text').innerText = trans.detail_content || trans.content;

      const imgEl = document.getElementById('modal-img');
      if (item.image_url) { imgEl.src = item.image_url; imgEl.style.display = 'block'; }
      else { imgEl.style.display = 'none'; }
      document.getElementById('detail-modal').classList.add('active');
    }

    function closeModal(e, force = false) { if (force || e.target.classList.contains('modal-overlay')) document.getElementById('detail-modal').classList.remove('active'); }
    async function deleteNews(id) { if (confirm('削除しますか？')) { await db.from('news').delete().eq('id', id); fetchGlobalNews(); } }
    function escapeHtml(str) { return str ? str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }
    </script>
  </body>
</html>
