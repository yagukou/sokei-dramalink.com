<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>【管理】ニュース投稿・削除</title>
    <style>
      body { font-family: sans-serif; background: #222; color: #fff; padding: 20px; }
      .container { max-width: 800px; margin: 0 auto; }
      .news-item { background: #333; padding: 15px; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
      .delete-btn { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
      .form-section { background: #111; padding: 20px; border-radius: 8px; margin-top: 30px; }
      .form-group { margin-bottom: 15px; }
      .form-group label { display: block; margin-bottom: 5px; color: #ccc; }
      .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; background: #222; border: 1px solid #555; color: white; border-radius: 4px; box-sizing: border-box; }
      .submit-btn { background: #b90e0e; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const db = window.supabase.createClient("https://blviywoprvcatwwrrysi.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsdml5d29wcnZjYXR3d3JyeXNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzM2MDUsImV4cCI6MjA5ODAwOTYwNX0.SAp7KNf21RKE5SStRlazyX5zKe-LVVCcEHz_fBV6UP8");
    </script>
  </head>
  <body>
    <div class="container">
      <h2>📢 ニュース管理画面</h2>
      <div id="admin-news-list"></div>

      <div class="form-section">
        <h3>➕ ニュースを投稿する</h3>
        <form onsubmit="submitNews(event)">
          <div class="form-group">
            <label>カテゴリー *</label>
            <select id="news-category">
              <option value="トピックス">トピックス</option>
              <option value="チケット">チケット</option>
              <option value="公演情報">公演情報</option>
              <option value="重要なお知らせ">重要なお知らせ</option>
            </select>
          </div>
          <div class="form-group">
            <label>タイトル *</label>
            <input type="text" id="news-title" required>
          </div>
          <div class="form-group">
            <label>画像URL (任意)</label>
            <input type="text" id="news-img-url" placeholder="例: ticket3.png や https://... などの画像のURL">
          </div>
          <div class="form-group">
            <label>本文 *</label>
            <textarea id="news-content" rows="4" required></textarea>
          </div>
          <button type="submit" class="submit-btn">ニュースを掲載する</button>
        </form>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', fetchAdminNews);

      async function fetchAdminNews() {
        const { data } = await db.from('news').select(`id, category, news_translations!inner(title)`).eq('news_translations.lang', 'ja').order('created_at', {ascending:false});
        const container = document.getElementById('admin-news-list');
        container.innerHTML = '';
        if(data) {
          data.forEach(item => {
            container.innerHTML += `
              <div class="news-item">
                <div><strong>[${item.category || 'トピックス'}]</strong> ${item.news_translations[0].title}</div>
                <button class="delete-btn" onclick="deleteNews('${item.id}')">削除</button>
              </div>
            `;
          });
        }
      }

      async function submitNews(event) {
        event.preventDefault();
        const category = document.getElementById('news-category').value;
        const title = document.getElementById('news-title').value;
        const imageUrl = document.getElementById('news-img-url').value;
        const content = document.getElementById('news-content').value;

        // 🌟 image_urlも一緒にデータベースに保存する
        const { data: newNews } = await db.from('news').insert([{ category, image_url: imageUrl }]).select().single();
        await db.from('news_translations').insert([{ news_id: newNews.id, lang: 'ja', title, content }]);
        
        alert('投稿しました！');
        location.reload();
      }

      async function deleteNews(id) {
        if(!confirm('削除しますか？')) return;
        await db.from('news').delete().eq('id', id);
        fetchAdminNews();
      }
    </script>
  </body>
</html>
