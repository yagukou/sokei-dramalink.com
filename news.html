<!DOCTYPE html>
<html lang="ja" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate">
    <title>ニュース・お知らせ｜早慶演劇祭</title>

    <style> 
    /* --- 全体設定：ブランド世界観の統一 --- */
    body {
      margin: 0;
      font-family: "Times New Roman", "Yu Mincho", "游明朝", "Noto Serif JP", serif;
      background: #111;  
      color: white; 
      -webkit-font-smoothing: antialiased;
      top: 0px !important;         
      position: static !important; 
    }

    /* --- ヘッダースタイル --- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #b90e0e;
      padding: 10px 20px;
      position: relative;
    }

    .menu-left, .menu-right {
      display: flex;
      gap: 10px;
      justify-content: space-around;
      align-items: center;
      z-index: 2;
    }

    .menu-left img, .menu-right img {
       width: 30px;
       height: 30px;
       margin-bottom: 5px;
    }

    .logo {
      font-family: "Times New Roman", serif;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #222;
      text-align: center;
      line-height: 1.2;
      display: flex;
      flex-direction: column;  
      align-items: center;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      max-width: 40%;  
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      text-decoration: none;
    }

    .logo-main {
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #ffffff;
    }

    .logo-sub {   
      font-size: 16px;   
      letter-spacing: 2px;
      color: #d4af37;      
    }

    a {
      text-decoration: none;
      color: black;
      font-size: 12px;
    }

    .menu-1 {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #b90e0e;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 80px;   
      height: 80px;  
      justify-content: center;
      box-sizing: border-box;
      transition: 0.3s;
      cursor: pointer;
    }

    .menu-1:hover {
      transform: translateY(-3px);
    }

    .menu-1 span {
      display: block;
      width: 100%;
      text-align: center;       
      margin-top: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 11px;
      color: #fff;
    }

    .lang-wrapper {
      position: relative;
      display: inline-block;
    }

    .lang-menu {
      position: absolute;
      top: 110%;   
      left: 0;
      width: 140px;
      background: #f0f0f0;
      border-radius: 12px;
      display: none;
      overflow: hidden;
      z-index: 9999;
    }

    .lang-menu div {
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      color: black;
    }

    .lang-menu div:hover {
      background: #ddd;
    }

    /* 📢 ニュース専用スタイル */
    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .page-title {
      font-size: 26px;
      text-align: center;
      letter-spacing: 2px;
      color: #c5a059; 
      margin-bottom: 20px;
      font-family: "Yu Mincho", serif;
    }

    .page-title::after {
      content: '';
      display: block;
      width: 50px;
      height: 1px;
      background: #c5a059;
      margin: 10px auto 0;
    }

    /* ニュースのヘッダー部分（言語切り替え） */
    .news-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .lang-switch-btn {
      background: #222;
      color: #ccc;
      border: 1px solid #444;
      padding: 6px 15px;
      margin-left: 5px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s;
    }

    .lang-switch-btn.active {
      background: #c5a059;
      color: #111;
      border-color: #c5a059;
      font-weight: bold;
    }

    /* ニュースリストのアイテム構造 */
    .news-item {
      padding: 20px 10px;
      border-bottom: 1px solid #222;
      color: #fff;
    }

    .news-meta {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 8px;
    }

    .news-date {
      font-family: sans-serif;
      font-size: 14px;
      color: #999;
    }

    .news-title {
      font-size: 18px;
      font-weight: bold;
      color: #c5a059;
      margin: 0 0 10px 0;
      line-height: 1.4;
    }

    .news-content {
      color: #eee;
      font-size: 14px;
      line-height: 1.6;
      margin: 0;
      white-space: pre-wrap;
    }

    /* 自由投稿フォームのスタイル */
    .news-post-section {
      background: #1a1a1a;
      padding: 25px;
      border-radius: 8px;
      margin-top: 5px;
      border: 1px solid #333;
    }

    .news-post-section h3 {
      margin-top: 0;
      color: #c5a059;
      font-family: "Yu Mincho", serif;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      font-weight: bold;
      color: #ccc;
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px;
      background: #222;
      border: 1px solid #444;
      color: white;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .form-group input:focus, .form-group textarea:focus {
      border-color: #c5a059;
      outline: none;
    }

    .submit-btn {
      background: #b90e0e;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .submit-btn:hover {
      background: #d61515;
    }

    .hamburger { display: none; }
    
    @media (max-width: 768px) {
      header { position: relative; height: 70px; }
      .logo { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); margin: 0; }
      .menu-left, .menu-right { display: none; }
      .hamburger { position: absolute; top: 15px; right: 20px; font-size: 30px; color: white; cursor: pointer; z-index: 1000; display: block; }
    }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://blviywoprvcatwwrrysi.supabase.co"; 
      const SUPABASE_ANON_KEY = "sb_publishable_Maty8Athv2jAshtOo8CtLA_RotZGWe5"; 
      
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>

    <script>
    function toggleLangMenu(e) {
      if (e) e.stopPropagation();
      const menu = document.getElementById("lang-menu");
      menu.style.display = (menu.style.display === "block") ? "none" : "block";
    }
    document.addEventListener("click", function() {
      const menu = document.getElementById("lang-menu");
      if (menu) menu.style.display = "none";
    });
    function setLang(lang) {
      document.cookie = "googtrans=/ja/" + lang + "; path=/";
      location.reload();
    }
    </script>
  </head>

  <body>

    <header>
      <div class="menu-left">
        <a href="ticket.html" class="menu-1">
          <img src="ticket3.png">
          <span>チケット</span>
        </a>
        <a href="what.html" class="menu-1">
          <img src="what3.png">
          <span>公演紹介</span>
        </a>
        <a href="Participant.html" class="menu-1">
          <img src="Participant3.png">
          <span>出場団体</span>
        </a>
        <a href="Schedule.html" class="menu-1">
          <img src="Schedule3.png">
          <span>スケジュール</span>
        </a>
      </div>

      <a href="index.html" class="logo">
        <div class="logo-main">早慶演劇祭</div>
        <div class="logo-sub">Waseda–Keio Theatre Festival</div>
      </a>

      <div class="menu-right">
        <a href="news.html" class="menu-1">
          <img src="news3.png">
          <span>ニュース</span>
        </a>
        <div class="lang-wrapper">
          <a class="menu-1" onclick="toggleLangMenu(event); return false;">
            <img src="Language3.png">
            <span>Language</span>
          </a>
          <div id="lang-menu" class="lang-menu">
            <div onclick="setLang('ja')">日本語</div>
            <div onclick="setLang('en')">ENGLISH</div>
            <div onclick="setLang('zh-CN')">简体中文</div>
            <div onclick="setLang('ko')">한국어</div>
          </div>
        </div>
        <a href="Inquiry.html" class="menu-1">
          <img src="Inquiry3.png">
          <span>お問い合わせ</span>
        </a>
        <a href="menu.html" class="menu-1">
          <img src="menu3.png">
          <span>メニュー</span>
        </a>
      </div>
      <div class="hamburger">☰</div>
    </header>

    <div class="container">
      <h2 class="page-title">NEWS & INFO</h2>
      
      <div class="news-header">
        <h3 style="margin: 0; font-size: 18px; font-family: 'Yu Mincho', serif;">Latest News</h3>
        <div>
          <button id="btn-lang-ja" class="lang-switch-btn active" onclick="switchNewsLanguage('ja')">日本語 🇯🇵</button>
          <button id="btn-lang-en" class="lang-switch-btn" onclick="switchNewsLanguage('en')">English 🇺🇸</button>
        </div>
      </div>
      
      <div id="news-container" style="margin-bottom: 50px;"></div>

      <div class="news-post-section">
        <h3>📢 新しいニュースを掲載する</h3>
        <form id="news-form" onsubmit="submitNews(event)">
          
          <div class="form-group">
            <label>🇯🇵 タイトル (日本語) *</label>
            <input type="text" id="news-title-ja" required placeholder="例：タイムテーブルが発表されました！">
          </div>
          <div class="form-group">
            <label>🇯🇵 本文 (日本語) *</label>
            <textarea id="news-content-ja" required rows="5" placeholder="ニュースの詳細を入力してください..."></textarea>
          </div>

          <hr style="border: 0; border-top: 1px dashed #444; margin: 20px 0;">

          <div class="form-group">
            <label>🇺🇸 Title (English) *</label>
            <input type="text" id="news-title-en" required placeholder="e.g. Soko Theater Festival Timetable Released!">
          </div>
          <div class="form-group">
            <label>🇺🇸 Content (English) *</label>
            <textarea id="news-content-en" required rows="5" placeholder="Enter news details here..."></textarea>
          </div>

          <button type="submit" class="submit-btn">ニュースを掲載する</button>
        </form>
      </div>
    </div>

    <script>
    let currentNewsLang = 'ja';

    // ページ読み込み時にニュース一覧を取得
    document.addEventListener('DOMContentLoaded', () => {
      fetchGlobalNews();
    });

    // 1. ニュースを投稿してSupabaseへ同期する関数
    async function submitNews(event) {
      event.preventDefault();

      const titleJa = document.getElementById('news-title-ja').value;
      const contentJa = document.getElementById('news-content-ja').value;
      const titleEn = document.getElementById('news-title-en').value;
      const contentEn = document.getElementById('news-content-en').value;

      try {
        // 親テーブル（news）へ空のレコードをインサートし、自動生成IDを取得
        const { data: newNews, error: newsError } = await supabase
          .from('news')
          .insert([{}]) 
          .select()
          .single();

        if (newsError) throw newsError;

        const newsId = newNews.id;

        // 子テーブル（news_translations）へ複数言語データを同時インサート
        const { error: transError } = await supabase
          .from('news_translations')
          .insert([
            { news_id: newsId, lang: 'ja', title: titleJa, content: contentJa },
            { news_id: newsId, lang: 'en', title: titleEn, content: contentEn }
          ]);

        if (transError) throw transError;

        alert('ニュースを掲載しました！');
        document.getElementById('news-form').reset();
        
        // リストを最新化
        await fetchGlobalNews();

      } catch (error) {
        console.error('ニュース投稿エラー:', error);
        alert('ニュースの掲載に失敗しました: ' + error.message);
      }
    }

    // 2. 指定されている言語の翻訳テキストをSupabaseから取得
    async function fetchGlobalNews() {
      try {
        const { data: newsList, error } = await supabase
          .from('news')
          .select(`
            id,
            created_at,
            news_translations!inner (
              title,
              content
            )
          `)
          .eq('news_translations.lang', currentNewsLang)
          .order('created_at', { ascending: false });

        if (error) throw error;

        renderNewsList(newsList);
      } catch (error) {
        console.error('ニュース取得エラー:', error);
      }
    }

    // 3. ニュースデータをDOM（HTML）に反映
    function renderNewsList(newsList) {
      const container = document.getElementById('news-container');
      container.innerHTML = ''; 

      if (!newsList || newsList.length === 0) {
        container.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">現在掲載されているニュースはありません。</p>';
        return;
      }

      newsList.forEach(item => {
        const translation = item.news_translations[0]; 
        if (!translation) return;

        const dateStr = new Date(item.created_at).toLocaleDateString('ja-JP', {
          year: 'numeric', month: '2-digit', day: '2-digit'
        });

        const newsItem = document.createElement('div');
        newsItem.className = 'news-item';
        newsItem.innerHTML = `
          <div class="news-meta">
            <span class="news-date">${dateStr}</span>
          </div>
          <h4 class="news-title">${escapeHtml(translation.title)}</h4>
          <p class="news-content">${escapeHtml(translation.content)}</p>
        `;
        container.appendChild(newsItem);
      });
    }

    // 4. 表示言語切り替えスイッチの処理
    function switchNewsLanguage(lang) {
      currentNewsLang = lang;
      
      // ボタンのアクティブ状態のクラス制御
      document.getElementById('btn-lang-ja').classList.toggle('active', lang === 'ja');
      document.getElementById('btn-lang-en').classList.toggle('active', lang === 'en');
      
      fetchGlobalNews(); 
    }

    // XSS脆弱性対策エスケープ
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    </script>
  </body>
</html>
