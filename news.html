<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ニュース一覧</title>
    <style> 
    :root {
      --bg-color: #1a1a1a;
      --card-bg: #262626;
      --card-hover: #333333;
      --accent-gold: #c5a059;
      --text-main: #ffffff;
      --text-sub: #aaaaaa;
      --modal-bg: #222222;
    }

    body { 
      margin: 0; 
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; 
      background: var(--bg-color); 
      color: var(--text-main); 
      padding: 40px 20px;
      line-height: 1.6;
    }

    .news-container { 
      max-width: 900px; 
      margin: 0 auto; 
    }

    h2 { 
      color: var(--accent-gold); 
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.05em;
      border-bottom: 2px solid var(--accent-gold); 
      padding-bottom: 15px; 
      margin-bottom: 30px;
    }

    /* 💡 ニュース一覧をグリッドレイアウト（並列配置）に対応 */
    #news-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }

    /* 💡 カード型デザインの洗練 */
    .news-item { 
      background: var(--card-bg); 
      border-radius: 12px; 
      overflow: hidden;
      cursor: pointer; 
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease, background 0.2s; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      border: 1px solid #333;
    }

    .news-item:hover { 
      background: var(--card-hover); 
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    }

    /* 💡 画像を綺麗に正方形〜長方形に統一して収める */
    .news-img-wrapper {
      width: 100%;
      height: 180px;
      background: #000;
      overflow: hidden;
      position: relative;
    }

    .news-img-preview { 
      width: 100%;
      height: 100%;
      object-fit: cover; /* 画像をはみ出させて綺麗に収める */
      transition: transform 0.3s ease;
    }

    .news-item:hover .news-img-preview {
      transform: scale(1.05); /* ホバー時に画像を少しズーム */
    }

    /* 💡 テキスト周りの余白（パディング）を美しく配置 */
    .news-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .news-meta { 
      color: var(--text-sub); 
      font-size: 13px; 
      font-weight: 500;
      margin-bottom: 8px; 
      letter-spacing: 0.03em;
    }

    .news-title { 
      font-size: 18px; 
      font-weight: 700;
      line-height: 1.4;
      margin: 0 0 10px 0; 
      color: var(--text-main);
      display: -webkit-box;
      -webkit-line-clamp: 2; /* タイトルが長すぎたら2行で三点リーダーにする */
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-content { 
      white-space: pre-wrap; 
      color: var(--text-sub); 
      font-size: 14px; 
      margin: 0; 
      display: -webkit-box;
      -webkit-line-clamp: 3; /* 一覧の本文は最大3行に制限してスッキリ見せる */
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 💡 ポップアップ（モーダル）の映画館のような高級感ある演出 */
    .modal-overlay { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(0, 0, 0, 0.85); 
      backdrop-filter: blur(8px); /* 背景をボカすトレンドデザイン */
      display: flex; 
      justify-content: center; 
      align-items: center; 
      z-index: 1000; 
      opacity: 0; 
      pointer-events: none; 
      transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
    }
    
    .modal-overlay.active { 
      opacity: 1; 
      pointer-events: auto; 
    }

    .modal-content { 
      background: var(--modal-bg); 
      padding: 40px; 
      border-radius: 16px; 
      max-width: 680px; 
      width: 90%; 
      max-height: 80vh; 
      overflow-y: auto; 
      position: relative; 
      border: 1px solid #444;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      transform: translateY(30px);
      transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .modal-overlay.active .modal-content {
      transform: translateY(0);
    }

    /* 💡 閉じるボタンを右上に美しく配置 */
    .modal-close { 
      position: absolute; 
      top: 20px; 
      right: 20px; 
      background: rgba(255,255,255,0.1); 
      color: var(--text-main); 
      border: none; 
      padding: 8px 16px; 
      border-radius: 20px; 
      cursor: pointer; 
      font-size: 14px;
      transition: background 0.2s;
    }
    
    .modal-close:hover {
      background: rgba(255,255,255,0.2);
    }

    .modal-date {
      color: var(--text-sub);
      font-size: 14px;
      margin-bottom: 10px;
    }

    .modal-title { 
      color: var(--accent-gold); 
      font-size: 26px; 
      font-weight: 700;
      margin: 0 0 20px 0; 
      line-height: 1.4;
      padding-right: 60px; /* 閉じるボタンとの被り防止 */
    }

    .modal-img { 
      width: 100%; 
      max-height: 380px; 
      object-fit: contain; 
      background: #111; 
      border-radius: 8px; 
      margin-bottom: 25px; 
      display: none; 
      border: 1px solid #333;
    }

    .modal-text { 
      color: #eeeeee; 
      font-size: 16px; 
      line-height: 1.8; 
      white-space: pre-wrap; 
      margin: 0;
    }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://blviywoprvcatwwrrysi.supabase.co"; 
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsdml5d29wcnZjYXR3d3JyeXNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzM2MDUsImV4cCI6MjA5ODAwOTYwNX0.SAp7KNf21RKE5SStRlazyX5zKe-LVVCcEHz_fBV6UP8"; 
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>
  </head>
  <body>
    <div class="news-container">
      <h2>📢 最新ニュース</h2>
      <div id="news-container"><p style="color: #aaa; text-align: center;">読み込み中...</p></div>
    </div>

    <!-- 詳細ポップアップ -->
    <div class="modal-overlay" id="detail-modal" onclick="closeModal(event)">
      <div class="modal-content">
        <button class="modal-close" onclick="closeModal(event, true)">✕ 閉じる</button>
        <div class="modal-date" id="modal-date"></div>
        <h3 class="modal-title" id="modal-title"></h3>
        <img src="" alt="詳細画像" class="modal-img" id="modal-img">
        <p class="modal-text" id="modal-text"></p>
      </div>
    </div>

    <script>
    let globalNewsData = [];
    document.addEventListener('DOMContentLoaded', () => { fetchGlobalNews(); });

    async function fetchGlobalNews() {
      const container = document.getElementById('news-container');
      try {
        const { data: newsList, error } = await db.from('news').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        const { data: transList, error: transError } = await db.from('news_translations').select('news_id, title, content, detail_content').eq('lang', 'ja');
        if (transError) throw transError;

        globalNewsData = (newsList || []).map(item => {
          const trans = (transList || []).find(t => t.news_id === item.id);
          return { ...item, news_translations: trans ? [trans] : [] };
        });
        renderNewsList(globalNewsData);
      } catch (error) {
        console.error(error);
        container.innerHTML = '<p style="color: #ff4d4d; text-align: center;">データの取得に失敗しました。</p>';
      }
    }

    function renderNewsList(newsList) {
      const container = document.getElementById('news-container');
      container.innerHTML = ''; 
      if (!newsList.length) { container.innerHTML = '<p style="color: #aaa; grid-column: 1/-1; text-align: center;">現在掲載されているニュースはありません。</p>'; return; }
      
      newsList.forEach(item => {
        const translation = item.news_translations[0]; 
        if (!translation) return;
        const dateStr = new Date(item.created_at).toLocaleDateString('ja-JP', {year: 'numeric', month: '2-digit', day: '2-digit'});
        
        const newsItem = document.createElement('div');
        newsItem.className = 'news-item';
        newsItem.addEventListener('click', () => { openModal(item.id, dateStr); });
        
        // 💡 画像エリアをラッパーで包み、画像なしでも崩れないように考慮
        let imgHtml = item.image_url ? `<div class="news-img-wrapper"><img src="${item.image_url}" class="news-img-preview"></div>` : '';
        
        newsItem.innerHTML = `
          ${imgHtml}
          <div class="news-body">
            <div class="news-meta">${dateStr}</div>
            <h4 class="news-title">${escapeHtml(translation.title)}</h4>
            <p class="news-content">${escapeHtml(translation.content)}</p>
          </div>
        `;
        container.appendChild(newsItem);
      });
    }

    function openModal(newsId, dateStr) {
      const item = globalNewsData.find(n => n.id === newsId);
      if (!item) return;
      const trans = item.news_translations[0];
      if (!trans) return;

      document.getElementById('modal-date').innerText = dateStr;
      document.getElementById('modal-title').innerText = trans.title;
      document.getElementById('modal-text').innerText = trans.detail_content || trans.content;

      const imgEl = document.getElementById('modal-img');
      if (item.image_url) { imgEl.src = item.image_url; imgEl.style.display = 'block'; }
      else { imgEl.style.display = 'none'; }

      document.getElementById('detail-modal').classList.add('active');
    }

    function closeModal(e, force = false) { if (force || e.target.classList.contains('modal-overlay')) document.getElementById('detail-modal').classList.remove('active'); }
    function escapeHtml(str) { return str ? str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }
    </script>
  </body>
</html>
