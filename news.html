<script>

    // 現在のアプリの表示言語（ユーザーの設定に合わせて 'ja' や 'en' に切り替える）
let currentLang = 'ja'; 

async function fetchGlobalNews() {
  const { data: newsList, error } = await supabase
    .from('news')
    .select(`
      id,
      created_at,
      news_translations (
        title,
        content
      )
    `)
    // ★ここがポイント：現在選択されている言語の翻訳だけを取得する
    .eq('news_translations.lang', currentLang)
    .order('created_at', { ascending: false });

  if (error) {
    console.error('ニュースの取得に失敗:', error);
    return;
  }

  renderNews(newsList);
}

function renderNews(newsList) {
  const newsContainer = document.getElementById('news-container');
  newsContainer.innerHTML = ''; // 一度中身を空にする

  newsList.forEach(item => {
    // 該当言語の翻訳データがあるかチェック（なければ「翻訳なし」などのフォールバック）
    const translation = item.news_translations[0]; 
    if (!translation) return; 

    // 日付をユーザーのローカル環境（日本ならJST）の表記に変換
    const dateStr = new Date(item.created_at).toLocaleDateString();

    // ニュース記事のHTMLを組み立て
    const newsItem = document.createElement('div');
    newsItem.className = 'news-card';
    newsItem.innerHTML = `
      <span class="news-date">${dateStr}</span>
      <h3 class="news-title">${escapeHtml(translation.title)}</h3>
      <p class="news-content">${escapeHtml(translation.content)}</p>
    `;
    
    newsContainer.appendChild(newsItem);
  });
}

// セキュリティ対策（XSS防止）のための簡易エスケープ関数
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

    <script>
    function removeGoogleUI() {
      document.querySelectorAll('.goog-te-banner-frame, .goog-te-banner, .goog-te-balloon-frame, #goog-gt-tt, .goog-gt-tt').forEach(el => el.remove());

let currentNewsLang = 'ja';

// ページ読み込み時にニュースを取得して表示
document.addEventListener('DOMContentLoaded', () => {
  fetchGlobalNews();
});

// 1. ニュースを自由に投稿してSupabaseに保存する関数
async function submitNews(event) {
  event.preventDefault(); // ページのリロードを防ぐ

  // フォームの入力値を取得
  const titleJa = document.getElementById('news-title-ja').value;
  const contentJa = document.getElementById('news-content-ja').value;
  const titleEn = document.getElementById('news-title-en').value;
  const contentEn = document.getElementById('news-content-en').value;

  try {
    // 1-1. まずは親の「news」テーブルにレコードを作って生成されたIDを取得
    const { data: newNews, error: newsError } = await supabase
      .from('news')
      .insert([{}]) // 空のオブジェクトでレコード作成（created_atは自働挿入）
      .select()
      .single();

    if (newsError) throw newsError;

    const newsId = newNews.id;

    // 1-2. 生成されたIDを使って「news_translations」に日本語と英語を同時保存
    const { error: transError } = await supabase
      .from('news_translations')
      .insert([
        { news_id: newsId, lang: 'ja', title: titleJa, content: contentJa },
        { news_id: newsId, lang: 'en', title: titleEn, content: contentEn }
      ]);

    if (transError) throw transError;

    alert('ニュースを掲載しました！');
    document.getElementById('news-form').reset(); // フォームをクリア
    
    // ニュース一覧を再取得して最新の状態にする
    await fetchGlobalNews();

  } catch (error) {
    console.error('ニュース投稿エラー:', error);
    alert('ニュースの掲載に失敗しました: ' + error.message);
  }
}

// 2. 指定された言語のニュースをSupabaseから引っ張ってくる関数
async function fetchGlobalNews() {
  try {
    const { data: newsList, error } = await supabase
      .from('news')
      .select(`
        id,
        created_at,
        news_translations (
          title,
          content
        )
      `)
      // ★ここがポイント：今選択されている言語（jaかen）のデータだけを合体させて取得
      .eq('news_translations.lang', currentNewsLang)
      .order('created_at', { ascending: false });

    if (error) throw error;

    renderNewsList(newsList);
  } catch (error) {
    console.error('ニュース取得エラー:', error);
  }
}

// 3. ニュースを画面（HTML）にレンダリングする関数
function renderNewsList(newsList) {
  const container = document.getElementById('news-container');
  container.innerHTML = ''; // 初期化

  if (newsList.length === 0) {
    container.innerHTML = '<p>現在掲載されているニュースはありません。</p>';
    return;
  }

  newsList.forEach(item => {
    const translation = item.news_translations[0]; // eqで絞り込んでいるため必ず0番目に入ります
    if (!translation) return;

    // 投稿日時を閲覧者のローカル（日本ならJST）の表記に変える
    const dateStr = new Date(item.created_at).toLocaleDateString();

    const newsCard = document.createElement('div');
    newsCard.style.borderBottom = '1px solid #eee';
    newsCard.style.padding = '15px 0';
    newsCard.innerHTML = `
      <small style="color: #666;">${dateStr}</small>
      <h4 style="margin: 5px 0 10px 0; color: #111;">${escapeHtml(translation.title)}</h4>
      <p style="color: #444; font-size: 0.95rem; white-space: pre-wrap;">${escapeHtml(translation.content)}</p>
    `;
    container.appendChild(newsCard);
  });
}

// 4. 言語を切り替えるボタンの処理
function switchNewsLanguage(lang) {
  currentNewsLang = lang;
  fetchGlobalNews(); // 言語変数を変えて再取得するだけで一瞬で切り替わります
}

// セキュリティ対策（XSS防止）用
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
