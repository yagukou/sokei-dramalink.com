<!DOCTYPE html>
<html lang="ja" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ニュース・お知らせ｜早慶演劇祭</title>

    <style> 
    /* --- 全体設定：ブランド世界観の統一 --- */
    body {
      margin: 0;
      font-family: "Times New Roman", "Yu Mincho", "游明朝", "Noto Serif JP", serif;
      background: #111;  
      color: white; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- ヘッダースタイル --- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #b90e0e;
      padding: 10px 20px;
      position: relative;
    }

    .menu-left, .menu-right {
      display: flex;
      gap: 10px;
      justify-content: space-around;
      align-items: center;
      z-index: 2;
    }

    .menu-left img, .menu-right img {
       width: 30px;
       height: 30px;
       margin-bottom: 5px;
    }

    .logo {
      font-family: "Times New Roman", serif;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #222;
      text-align: center;
      line-height: 1.2;
      display: flex;
      flex-direction: column;  
      align-items: center;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      text-decoration: none;
    }

    .logo-main { font-size: 22px; font-weight: bold; letter-spacing: 3px; color: #ffffff; }
    .logo-sub { font-size: 16px; letter-spacing: 2px; color: #d4af37; }
    a { text-decoration: none; color: black; font-size: 12px; }

    .menu-1 {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #b90e0e;
      border-radius: 12px;
      padding: 10px;
      width: 80px;   
      height: 80px;  
      justify-content: center;
      box-sizing: border-box;
      transition: 0.3s;
      cursor: pointer;
    }
    .menu-1:hover { transform: translateY(-3px); }
    .menu-1 span { display: block; width: 100%; text-align: center; margin-top: 5px; font-size: 11px; color: #fff; }

    /* 📢 ニュースリストのスタイル */
    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .page-title {
      font-size: 26px;
      text-align: center;
      letter-spacing: 2px;
      color: #c5a059; 
      margin-bottom: 20px;
      font-family: "Yu Mincho", serif;
    }

    .news-header {
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    /* タップ可能なニュースカード */
    .news-item {
      padding: 20px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      margin-bottom: 15px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
    }

    .news-item:hover {
      transform: translateY(-2px);
      border-color: #c5a059;
    }

    .news-date {
      font-size: 13px;
      color: #888;
      margin-bottom: 5px;
      display: block;
    }

    .news-title {
      font-size: 18px;
      font-weight: bold;
      color: #c5a059;
      margin: 0 0 10px 0;
    }

    /* 一覧では長い本文を3行で省略表示 */
    .news-content {
      color: #ccc;
      font-size: 14px;
      line-height: 1.6;
      margin: 0;
      white-space: pre-wrap;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 📌 タップ時に起動する詳細ポップアップ（モーダル） */
    .news-modal {
      display: none; /* 初期状態は非表示 */
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .news-modal-content {
      background: #1c1c1c;
      border: 1px solid #c5a059;
      border-radius: 12px;
      max-width: 650px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      padding: 25px;
      box-sizing: border-box;
    }

    .news-modal-close {
      position: absolute;
      top: 15px; right: 20px;
      font-size: 32px;
      color: #999;
      cursor: pointer;
    }
    .news-modal-close:hover { color: #fff; }

    .news-modal-img {
      width: 100%;
      max-height: 380px;
      object-fit: contain;
      background: #000;
      border-radius: 6px;
      margin-bottom: 15px;
      display: none; /* 画像がある時だけJSでblockにする */
    }

    .news-modal-title {
      font-size: 22px;
      color: #c5a059;
      margin: 0 0 8px 0;
      font-family: "Yu Mincho", serif;
    }

    .news-modal-date {
      font-size: 13px;
      color: #777;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }

    .news-modal-text {
      font-size: 15px;
      line-height: 1.8;
      color: #eee;
      white-space: pre-wrap;
      margin: 0;
    }

    @media (max-width: 768px) {
      .menu-left, .menu-right { display: none; }
    }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://blviywoprvcatwwrrysi.supabase.co"; 
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsdml5d29wcnZjYXR3d3JyeXNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MzM2MDUsImV4cCI6MjA5ODAwOTYwNX0.SAp7KNf21RKE5SStRlazyX5zKe-LVVCcEHz_fBV6UP8"; 
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>
  </head>

  <body>
    <header>
      <div class="menu-left">
        <a href="ticket.html" class="menu-1"><img src="ticket3.png"><span>チケット</span></a>
        <a href="what.html" class="menu-1"><img src="what3.png"><span>公演紹介</span></a>
      </div>
      <a href="index.html" class="logo">
        <div class="logo-main">早慶演劇祭</div>
        <div class="logo-sub">Waseda–Keio Theatre Festival</div>
      </a>
      <div class="menu-right">
        <a href="news.html" class="menu-1"><img src="news3.png"><span>ニュース</span></a>
        <a href="Inquiry.html" class="menu-1"><img src="Inquiry3.png"><span>お問い合わせ</span></a>
      </div>
    </header>

    <div class="container">
      <h2 class="page-title">NEWS & INFO</h2>
      <div class="news-header">
        <h3 style="margin: 0; font-size: 18px; font-family: 'Yu Mincho', serif;">お知らせ一覧</h3>
      </div>
      <div id="news-container">
        <p style="color: #999; text-align: center; padding: 20px;">ニュースを読み込んでいます...</p>
      </div>
    </div>

    <!-- 📌 ポップアップモーダル本体 -->
    <div id="news-detail-modal" class="news-modal" onclick="closeNewsModal()">
      <div class="news-modal-content" onclick="event.stopPropagation()">
        <span class="news-modal-close" onclick="closeNewsModal()">&times;</span>
        <img id="modal-img" class="news-modal-img" src="" alt="ニュース画像">
        <h3 id="modal-title" class="news-modal-title"></h3>
        <div id="modal-date" class="news-modal-date"></div>
        <p id="modal-text" class="news-modal-text"></p>
      </div>
    </div>

    <script>
    let fetchedNewsData = [];

    document.addEventListener('DOMContentLoaded', () => { fetchGlobalNews(); });

    async function fetchGlobalNews() {
      const container = document.getElementById('news-container');
      try {
        const { data: newsList, error } = await db
          .from('news')
          .select(`id, created_at, image_url`)
          .order('created_at', { ascending: false });

        if (error) throw error;

        const { data: transList, error: transError } = await db
          .from('news_translations')
          .select('news_id, title, content')
          .eq('lang', 'ja');

        if (transError) throw transError;

        // 白紙化・結合エラー対策マッピング
        fetchedNewsData = (newsList || []).map(item => {
          const trans = (transList || []).find(t => t.news_id === item.id);
          return { ...item, news_translations: trans ? [trans] : [] };
        });

        renderNewsList(fetchedNewsData);
      } catch (error) {
        console.error(error);
        container.innerHTML = '<p style="color: #ff4d4d; text-align: center;">データの取得に失敗しました。</p>';
      }
    }

    function renderNewsList(newsList) {
      const container = document.getElementById('news-container');
      container.innerHTML = ''; 

      if (!newsList || newsList.length === 0) {
        container.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">現在お知らせはありません。</p>';
        return;
      }

      newsList.forEach(item => {
        const translation = item.news_translations && item.news_translations[0]; 
        if (!translation) return;

        const dateStr = new Date(item.created_at).toLocaleDateString('ja-JP', {year: 'numeric', month: '2-digit', day: '2-digit'});

        const newsItem = document.createElement('div');
        newsItem.className = 'news-item';
        newsItem.onclick = () => openNewsModal(item.id); // タップしたら詳細を開く
        
        newsItem.innerHTML = `
          <span class="news-date">${dateStr}</span>
          <h4 class="news-title">${escapeHtml(translation.title)}</h4>
          <p class="news-content">${escapeHtml(translation.content)}</p>
        `;
        container.appendChild(newsItem);
      });
    }

    // 💡 ポップアップを開く処理
    function openNewsModal(newsId) {
      const item = fetchedNewsData.find(n => n.id === newsId);
      if (!item) return;

      const translation = item.news_translations && item.news_translations[0];
      if (!translation) return;

      const dateStr = new Date(item.created_at).toLocaleDateString('ja-JP', {
        year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
      });

      document.getElementById('modal-title').innerText = translation.title;
      document.getElementById('modal-date').innerText = "投稿日時: " + dateStr;
      document.getElementById('modal-text').innerText = translation.content;

      const modalImg = document.getElementById('modal-img');
      if (item.image_url) {
        modalImg.src = item.image_url;
        modalImg.style.display = 'block'; // 画像があれば表示
      } else {
        modalImg.style.display = 'none';  // なければ非表示
        modalImg.src = '';
      }

      document.getElementById('news-detail-modal').style.display = 'flex';
      document.body.style.overflow = 'hidden'; // 背面のスクロールを固定
    }

    // 💡 ポップアップを閉じる処理
    function closeNewsModal() {
      document.getElementById('news-detail-modal').style.display = 'none';
      document.body.style.overflow = ''; // スクロール固定を解除
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    </script>
  </body>
</html>
