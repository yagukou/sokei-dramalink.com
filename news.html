<!DOCTYPE html>
<html lang="ja" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate">
    <title>ニュース一覧｜早慶演劇祭</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #fcfbfa;
        color: #333;
        padding-bottom: 60px;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
      }
      .breadcrumb {
        font-size: 13px;
        color: #888;
        margin-bottom: 10px;
      }
      .page-title {
        font-size: 28px;
        font-weight: bold;
        margin: 0 0 30px 0;
        color: #111;
      }
      /* タブ（カテゴリー）スタイル */
      .category-tabs {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 30px;
        border-bottom: 1px solid #eaeaea;
        padding-bottom: 20px;
      }
      .tab-btn {
        background: #f1f0ea;
        color: #555;
        border: none;
        padding: 8px 18px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: 0.2s;
      }
      .tab-btn:hover {
        background: #e5e4de;
      }
      .tab-btn.active {
        background: #111;
        color: #fff;
      }
      /* ニュースリストスタイル */
      .news-list {
        border-top: 1px solid #eaeaea;
      }
      .news-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 10px;
        border-bottom: 1px solid #eaeaea;
        text-decoration: none;
        color: inherit;
        transition: background 0.2s;
      }
      .news-item:hover {
        background: #faf9f6;
      }
      .news-left-box {
        display: flex;
        align-items: center;
        gap: 20px;
        flex: 1;
      }
      .news-date-tag {
        display: flex;
        flex-direction: column;
        gap: 5px;
        width: 110px;
        flex-shrink: 0;
      }
      .news-date {
        font-size: 13px;
        color: #888;
        font-family: monospace, sans-serif;
      }
      .news-tag {
        display: inline-block;
        font-size: 11px;
        font-weight: bold;
        padding: 4px 10px;
        border-radius: 12px;
        text-align: center;
        width: fit-content;
      }
      /* カテゴリーごとの色分け */
      .tag-ticket { background: #dbeafe; color: #1e40af; }
      .tag-info { background: #fef3c7; color: #92400e; }
      .tag-topics { background: #f3f4f6; color: #374151; }
      .tag-notice { background: #fee2e2; color: #991b1b; }
      
      .news-title {
        font-size: 15px;
        font-weight: 600;
        color: #222;
        margin: 0;
        line-height: 1.5;
      }
      .arrow-icon {
        color: #ccc;
        font-size: 16px;
        padding-left: 10px;
      }
      /* ページネーション */
      .pagination {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 40px;
      }
      .page-btn {
        background: #f1f0ea;
        color: #333;
        border: none;
        width: 36px;
        height: 36px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .page-btn.active {
        background: #111;
        color: #fff;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const db = window.supabase.createClient("https://blviywoprvcatwwrrysi.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsdml5d29wcnZjYXR3d3JyeXNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzM2MDUsImV4cCI6MjA5ODAwOTYwNX0.SAp7KNf21RKE5SStRlazyX5zKe-LVVCcEHz_fBV6UP8");
    </script>
  </head>
  <body>
    <div class="container">
      <div class="breadcrumb">ホーム / ニュース</div>
      <h2 class="page-title">ニュース一覧</h2>

      <div class="category-tabs">
        <button class="tab-btn active" onclick="filterCategory('すべて')">すべて</button>
        <button class="tab-btn" onclick="filterCategory('チケット')">チケット</button>
        <button class="tab-btn" onclick="filterCategory('公演情報')">公演情報</button>
        <button class="tab-btn" onclick="filterCategory('トピックス')">トピックス</button>
        <button class="tab-btn" onclick="filterCategory('重要なお知らせ')">重要なお知らせ</button>
      </div>

      <div id="news-list" class="news-list"></div>

      <div id="pagination" class="pagination"></div>
    </div>

    <script>
      let allNews = [];
      let currentCategory = 'すべて';
      let currentPage = 1;
      const itemsPerPage = 5; // 1ページあたりの件数

      document.addEventListener('DOMContentLoaded', fetchNews);

      async function fetchNews() {
        try {
          const { data, error } = await db
            .from('news')
            .select(`id, created_at, category, news_translations!inner (title, content)`)
            .eq('news_translations.lang', 'ja')
            .order('created_at', { ascending: false });

          if (error) throw error;
          allNews = data;
          renderData();
        } catch (error) {
          console.error(error);
        }
      }

      function filterCategory(cat) {
        currentCategory = cat;
        currentPage = 1;
        // タブのアクティブ変更
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.classList.toggle('active', btn.innerText === cat);
        });
        renderData();
      }

      function renderData() {
        // カテゴリーで絞り込み
        const filtered = currentCategory === 'すべて' 
          ? allNews 
          : allNews.filter(item => item.category === currentCategory);

        // ページネーション計算
        const totalItems = filtered.length;
        const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = filtered.slice(start, end);

        // リスト描画
        const listContainer = document.getElementById('news-list');
        listContainer.innerHTML = '';

        if (pageItems.length === 0) {
          listContainer.innerHTML = '<p style="padding:20px; color:#888; text-align:center;">該当するニュースはありません。</p>';
        } else {
          pageItems.forEach(item => {
            const trans = item.news_translations[0];
            const dateStr = new Date(item.created_at).toLocaleDateString('ja-JP', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '.');
            
            // タグクラスの選定
            let tagClass = 'tag-topics';
            if (item.category === 'チケット') tagClass = 'tag-ticket';
            if (item.category === '公演情報') tagClass = 'tag-info';
            if (item.category === '重要なお知らせ') tagClass = 'tag-notice';

            listContainer.innerHTML += `
              <div class="news-item">
                <div class="news-left-box">
                  <div class="news-date-tag">
                    <span class="news-date">${dateStr}</span>
                    <span class="news-tag ${tagClass}">${item.category || 'トピックス'}</span>
                  </div>
                  <h4 class="news-title">${escapeHtml(trans.title)}</h4>
                </div>
                <span class="arrow-icon">❯</span>
              </div>
            `;
          });
        }

        // ページボタン描画
        const pager = document.getElementById('pagination');
        pager.innerHTML = '';
        for (let i = 1; i <= totalPages; i++) {
          pager.innerHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        }
      }

      function changePage(page) {
        currentPage = page;
        renderData();
        window.scrollTo(0, 0);
      }

      function escapeHtml(str) {
        return str ? str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : '';
      }
    </script>
  </body>
</html>
