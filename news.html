<!DOCTYPE html>
<html lang="ja" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate">
    <title>ニュース一覧｜早慶演劇祭</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", sans-serif;
        background: #fcfbfa; 
        color: #333;
        padding-bottom: 60px;
      }
      .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
      .breadcrumb { font-size: 13px; color: #888; margin-bottom: 10px; }
      .page-title { font-size: 28px; font-weight: bold; margin: 0 0 30px 0; color: #111; }
      
      /* カテゴリータブ */
      .category-tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; border-bottom: 1px solid #eaeaea; padding-bottom: 20px; }
      .tab-btn { background: #f1f0ea; color: #555; border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; }
      .tab-btn:hover { background: #e5e4de; }
      .tab-btn.active { background: #111; color: #fff; }
      
      /* リスト形式（行並び）レイアウト */
      .news-list-container {
        border-top: 1px solid #eaeaea;
        margin-bottom: 30px;
      }

      .news-item { 
        display: flex;
        align-items: center;
        padding: 20px 0;
        border-bottom: 1px solid #eaeaea;
        cursor: pointer; 
        transition: background-color 0.2s ease;
        text-decoration: none;
        color: inherit;
      }

      .news-item:hover { 
        background-color: #f7f6f0; 
      }

      /* 左側のメタ情報（日付とタグを縦に並べる） */
      .news-meta { 
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        width: 140px;
        flex-shrink: 0;
      }

      .news-date { 
        color: #666; 
        font-size: 14px; 
        font-family: 'Helvetica Neue', Arial, sans-serif; 
        font-weight: 500;
      }

      .news-tag { 
        display: inline-block; 
        font-size: 12px; 
        font-weight: bold; 
        padding: 4px 0;
        width: 110px;
        text-align: center;
        border-radius: 12px; 
        border: 1px solid transparent;
      }
      
      /* タグの色分け */
      .tag-ticket { background: #e0ebf7; color: #4a779d; } 
      .tag-info { background: #f3eff0; color: #6e645e; border: 1px solid #e1dad7; } 
      .tag-topics { background: #f3eff0; color: #6e645e; border: 1px solid #e1dad7; } 
      .tag-notice { background: #fee2e2; color: #991b1b; } 

      /* 右側のタイトルエリア */
      .news-title { 
        font-size: 16px; 
        font-weight: 600;
        line-height: 1.5;
        margin: 0; 
        color: #222;
        flex-grow: 1;
        padding-right: 20px;
      }

      /* 右端の矢印（ > ） */
      .news-arrow {
        color: #b3b3b3;
        font-family: monospace;
        font-size: 18px;
        font-weight: bold;
        flex-shrink: 0;
        padding-right: 5px;
      }
      
      /* ページネーション */
      .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 40px; }
      .page-btn { background: #f1f0ea; color: #333; border: none; width: 38px; height: 38px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 14px; }
      .page-btn.active { background: #111; color: #fff; }

      /* ポップアップ（モーダル）演出 */
      .modal-overlay { 
        display: none; 
        position: fixed; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        background: rgba(0,0,0,0.6); 
        backdrop-filter: blur(8px); 
        z-index: 1000; 
        justify-content: center; 
        align-items: center; 
        padding: 20px; 
        box-sizing: border-box; 
      }
      .modal-overlay.active { display: flex; }
      .modal-box { 
        background: white; 
        max-width: 600px; 
        width: 100%; 
        max-height: 85vh; 
        overflow-y: auto; 
        border-radius: 16px; 
        padding: 40px; 
        position: relative; 
        box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
        animation: fadeIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
      }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
      .modal-close { position: absolute; top: 20px; right: 20px; font-size: 24px; background: none; border: none; cursor: pointer; color: #888; }
      .modal-close:hover { color: #111; }
      .modal-title { font-size: 22px; font-weight: bold; margin: 0 0 20px 0; color: #111; line-height: 1.4; padding-right: 40px; }
      .modal-img { width: 100%; max-height: 380px; object-fit: contain; background: #f7f7f7; border-radius: 8px; margin-bottom: 25px; display: none; border: 1px solid #eaeaea; }
      .modal-content { font-size: 15px; line-height: 1.8; color: #444; white-space: pre-wrap; margin: 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const db = window.supabase.createClient("https://blviywoprvcatwwrrysi.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsdml5d29wcnZjYXR3d3JyeXNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzM2MDUsImV4cCI6MjA5ODAwOTYwNX0.SAp7KNf21RKE5SStRlazyX5zKe-LVVCcEHz_fBV6UP8");
    </script>
  </head>
  <body>
    <div class="container">
      <div class="breadcrumb">ホーム / ニュース</div>
      <h2 class="page-title">ニュース一覧</h2>

      <!-- カテゴリータブ -->
      <div class="category-tabs">
        <button class="tab-btn active" onclick="filterCategory('すべて')">すべて</button>
        <button class="tab-btn" onclick="filterCategory('チケット')">チケット</button>
        <button class="tab-btn" onclick="filterCategory('公演情報')">公演情報</button>
        <button class="tab-btn" onclick="filterCategory('トピックス')">トピックス</button>
        <button class="tab-btn" onclick="filterCategory('重要なお知らせ')">重要なお知らせ</button>
      </div>

      <!-- ニュースリスト -->
      <div id="news-list" class="news-list-container"></div>
      <div id="pagination" class="pagination"></div>
    </div>

    <!-- ポップアップ（モーダル） -->
    <div id="news-modal" class="modal-overlay" onclick="closeModal()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div style="margin-bottom: 15px; display: flex; gap: 10px; align-items: center;">
          <span id="modal-date" style="color: #666; font-size: 14px; font-family: monospace;"></span>
          <span id="modal-tag" class="news-tag" style="width: auto; padding: 3px 12px;"></span>
        </div>
        <h3 id="modal-title" class="modal-title"></h3>
        <img id="modal-img" class="modal-img" src="" alt="ニュース画像">
        <p id="modal-content" class="modal-content"></p>
      </div>
    </div>

    <script>
      let allNews = [];
      let currentCategory = 'すべて';
      let currentPage = 1;
      const itemsPerPage = 7; 

      document.addEventListener('DOMContentLoaded', fetchNews);

      async function fetchNews() {
        try {
          const { data, error } = await db
            .from('news')
            .select(`id, created_at, category, image_url, news_translations!inner (title, content, detail_content)`)
            .eq('news_translations.lang', 'ja')
            .order('created_at', { ascending: false });

          if (error) throw error;
          allNews = data;
          renderData();
        } catch (error) { console.error(error); }
      }

      function filterCategory(cat) {
        currentCategory = cat;
        currentPage = 1;
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.classList.toggle('active', btn.innerText === cat);
        });
        renderData();
      }

      function renderData() {
        const filtered = currentCategory === 'すべて' ? allNews : allNews.filter(item => item.category === currentCategory);
        const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
        const pageItems = filtered.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

        const listContainer = document.getElementById('news-list');
        listContainer.innerHTML = '';

        if (pageItems.length === 0) {
          listContainer.innerHTML = '<p style="padding:40px 0; color:#888; text-align:center;">該当するニュースはありません。</p>';
        } else {
          pageItems.forEach((item) => {
            const trans = item.news_translations[0];
            const dateStr = new Date(item.created_at).toLocaleDateString('ja-JP', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '.');
            
            let tagClass = 'tag-topics';
            if (item.category === 'チケット') tagClass = 'tag-ticket';
            if (item.category === '公演情報') tagClass = 'tag-info';
            if (item.category === '重要なお知らせ') tagClass = 'tag-notice';

            const globalIndex = allNews.findIndex(n => n.id === item.id);

            // ⭕ 一覧用の小さなサムネイル（thumbHtml）を削除しました
            listContainer.innerHTML += `
              <div class="news-item" onclick="openModal(${globalIndex})">
                <div class="news-meta">
                  <span class="news-date">${dateStr}</span>
                  <span class="news-tag ${tagClass}">${item.category || 'トピックス'}</span>
                </div>
                <h4 class="news-title">${escapeHtml(trans.title)}</h4>
                <span class="news-arrow">&gt;</span>
              </div>
            `;
          });
        }

        const pager = document.getElementById('pagination');
        pager.innerHTML = '';
        for (let i = 1; i <= totalPages; i++) {
          pager.innerHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        }
      }

      function openModal(index) {
        const item = allNews[index];
        const trans = item.news_translations[0];
        const dateStr = new Date(item.created_at).toLocaleDateString('ja-JP', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '.');

        document.getElementById('modal-date').innerText = dateStr;
        
        const tag = document.getElementById('modal-tag');
        tag.innerText = item.category || 'トピックス';
        tag.className = 'news-tag';
        if (item.category === 'チケット') tag.classList.add('tag-ticket');
        if (item.category === '公演情報') tag.classList.add('tag-info');
        if (item.category === '重要なお知らせ') tag.classList.add('tag-notice');
        if (!item.category || item.category === 'トピックス') tag.classList.add('tag-topics');

        document.getElementById('modal-title').innerText = trans.title;
        document.getElementById('modal-content').innerText = trans.detail_content || trans.content;

        const imgEl = document.getElementById('modal-img');
        if (item.image_url && item.image_url.trim() !== "") {
          imgEl.src = item.image_url;
          imgEl.style.display = "block"; // ポップアップ内では画像を表示する
        } else {
          imgEl.style.display = "none";
        }

        document.getElementById('news-modal').classList.add('active');
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById('news-modal').classList.remove('active');
        document.body.style.overflow = "auto";
      }

      function changePage(page) { currentPage = page; renderData(); window.scrollTo(0, 0); }
      function escapeHtml(str) { return str ? str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : ''; }
    </script>
  </body>
</html>
