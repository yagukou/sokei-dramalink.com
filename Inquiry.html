<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせ</title>

  <style>
    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #ffecd2, #fcb69f);
      margin: 0;
      padding: 20px;
    }

    .form-container {
      max-width: 500px;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    textarea {
      resize: vertical;
      height: 100px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      background: #ff7e5f;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    button:hover {
      background: #eb6750;
    }
  </style>
</head>

<body>

<div class="form-container">
  <h2>お問い合わせ</h2>

  <form action="https://formspree.io/f/xbdpqpql" method="POST">
    <label>お名前</label>
    <input type="text" name="name" required>

    <label>メールアドレス</label>
    <input type="email" name="email" required>

    <label>お問い合わせ内容</label>
    <textarea name="message" required></textarea>

    <button type="submit">送信</button>
  </form>
</div>

</body>
</html>
