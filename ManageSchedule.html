<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if is_edit %}公演情報の編集{% else %}新しい公演の設定{% endif %}</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --primary: #4f46e5;
            --radius: 12px;
        }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 40px 20px; }
        .form-container { max-width: 550px; margin: 0 auto; background: var(--card-bg); padding: 40px; border-radius: var(--radius); box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.05); border: 1px solid #e2e8f0; }
        
        h1 { font-size: 24px; font-weight: 800; margin-top: 0; margin-bottom: 8px; color: var(--text-main); }
        .subtitle { font-size: 14px; color: #64748b; margin-bottom: 32px; }
        
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #334155; }
        
        input[type="text"], input[type="datetime-local"], textarea { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 15px; background-color: #f8fafc; transition: all 0.2s; }
        input[type="text"]:focus, input[type="datetime-local"]:focus, textarea :focus { outline: none; border-color: var(--primary); background-color: #fff; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        
        textarea { height: 120px; resize: vertical; }
        
        .btn-submit { background-color: var(--primary); color: white; border: none; padding: 14px; font-size: 16px; font-weight: 700; border-radius: 8px; cursor: pointer; width: 100%; transition: background 0.2s; margin-top: 10px; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        .btn-submit:hover { background-color: #4338ca; }
        
        .btn-cancel { display: block; text-align: center; margin-top: 16px; color: #64748b; text-decoration: none; font-size: 14px; font-weight: 500; }
        .btn-cancel:hover { color: var(--text-main); text-decoration: underline; }
    </style>
</head>
<body>

    <div class="form-container">
        <!-- 状況（新規 or 編集）によってタイトルを自動で切り替える -->
        <h1>{% if is_edit %}📝 公演情報の編集{% else %}🎭 新しい公演の設定{% endif %}</h1>
        <p class="subtitle">日時の入力に応じて、一覧とアーカイブへ自動で仕分けられます。</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="title">公演名・タイトル</label>
                <!-- value属性に既存のデータ（performance.titleなど）を指定することで、編集時に自動で文字が入ります -->
                <input type="text" id="title" name="title" value="{{ performance.title }}" placeholder="例：ロミオとジュリエット" required>
            </div>

            <div class="form-group">
                <label for="theater_group">主宰劇団名</label>
                <input type="text" id="theater_group" name="theater_group" value="{{ performance.theater_group }}" placeholder="例：◯◯舞台 / 慶應◯◯" required>
            </div>

            <div class="form-group">
                <label for="start_date">開演日時（スタート）</label>
                <!-- Djangoの仕様に合わせて日時のフォーマットを整えて流し込みます -->
                <input type="datetime-local" id="start_date" name="start_date" value="{{ performance.start_date|date:'Y-m-d\TH:i' }}" required>
            </div>

            <div class="form-group">
                <label for="end_date">終演日時（千穐楽・ラスト）</label>
                <input type="datetime-local" id="end_date" name="end_date" value="{{ performance.end_date|date:'Y-m-d\TH:i' }}" required>
            </div>

            <div class="form-group">
                <label for="description">公演の紹介文・詳細</label>
                <textarea id="description" name="description" placeholder="あらすじやチケット情報などを入力してください。">{{ performance.description }}</textarea>
            </div>

            <button type="submit" class="btn-submit">
                {% if is_edit %}更新を保存する{% else %}🚀 この内容で公演を設定する{% endif %}
            </button>
        </form>

        <a href="/schedule/" class="btn-cancel">キャンセルして戻る</a>
    </div>

</body>
</html>
